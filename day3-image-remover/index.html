<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day 3 - Image Remover</title>
  <style>
    img { width: 150px; margin: 10px; border-radius: 8px; }
    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      color: white;
    }
    #remove-btn { background: #e74c3c; }
    #toggle-btn { background: #3498db; }
  </style>
</head>
<body>
  <h1>Image Remover</h1>
  <button id="remove-btn">Remove All Images</button>
  <button id="toggle-btn">Hide / Show Images</button>
  <br>
  <img src="https://picsum.photos/150?random=1" alt="img1">
  <img src="https://picsum.photos/150?random=2" alt="img2">
  <img src="https://picsum.photos/150?random=3" alt="img3">
  <script src="app.js"></script>
</body>
</html>
