<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day 4 - Content Copier</title>
  <style>
    .wrapper {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .box {
      flex: 1;
      padding: 20px;
      border: 2px solid #ddd;
      border-radius: 8px;
      min-height: 150px;
    }
    #source { background: #eaf4fb; }
    #target { background: #eafbea; }
    button {
      padding: 10px 20px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Content Copier</h1>
  <button id="copy-btn">Copy Source → Target</button>
  <div class="wrapper">
    <div class="box" id="source">
      <h3>Source</h3>
      <p>This is the source content that will be copied!</p>
      <p>It can have multiple paragraphs.</p>
    </div>
    <div class="box" id="target">
      <h3>Target</h3>
      <p><em>Content will appear here...</em></p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
